<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>玺赢</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- ========== 顶部导航 ========== -->
    <header class="header">
      <div class="header-inner">
        <a href="/" class="logo">
          <span class="logo-icon">✦</span>
          <span class="logo-text">玺赢</span>
        </a>

        <div class="search-bar">
          <div class="search-field">
            <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="searchCode" placeholder="编码搜索" />
          </div>
          <div class="search-field">
            <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/>
            </svg>
            <input type="text" id="searchBarcode" placeholder="条码搜索" />
          </div>
          <button id="searchBtn" class="btn btn-primary">搜索</button>
          <button id="resetBtn" class="btn btn-ghost">重置</button>
        </div>
      </div>
    </header>

    <!-- ========== 提示横幅 (按回车搜索) ========== -->
    <div class="hint-bar">按 <kbd>Enter</kbd> 快速搜索 · 点击商品查看详情</div>

    <div class="container">
      <!-- ========== 左侧分类 ========== -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16v2H4zM6 8h12v2H6zM8 12h8v2H8zM10 16h4v2h-4z"/>
          </svg>
          <span>分类筛选</span>
        </div>
        <ul id="categoryTree" class="category-tree">
          <li class="cat-all active" data-id="">
            <span class="cat-dot"></span>
            全部服装
          </li>
        </ul>
      </aside>

      <!-- ========== 右侧主区 ========== -->
      <main class="main">
        <!-- 筛选栏 -->
        <div class="filter-bar">
          <div class="filter-tags">
            <span class="filter-tag tag-all" id="currentCategory">全部服装</span>
            <span class="filter-tag tag-result" id="resultCount"></span>
          </div>
          <div class="filter-actions">
            <select id="mobileCategory" class="mobile-cat-select" style="display:none;">
              <option value="">全部服装</option>
            </select>
            <button id="viewToggle" class="btn-icon" title="切换视图">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- 商品网格 -->
        <div id="clothingGrid" class="clothing-grid"></div>

        <!-- 空状态 -->
        <div id="emptyState" class="empty-state" style="display:none;">
          <div class="empty-icon">🔍</div>
          <p class="empty-title">暂无匹配商品</p>
          <p class="empty-desc">试试调整搜索条件或换个分类看看</p>
        </div>

        <!-- 加载 -->
        <div id="loading" class="loading" style="display:none;">
          <div class="spinner"></div>
          <p>正在加载...</p>
        </div>

        <!-- 分页 -->
        <div id="pagination" class="pagination" style="display:none;"></div>
      </main>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
